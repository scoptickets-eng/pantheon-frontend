<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#C4912A"/>
  
  <!-- Pantheon simplified: triangular pediment + columns -->
  <!-- Pediment (triangle) -->
  <polygon points="5,14 16,6 27,14" fill="none" stroke="#fff" stroke-width="1.5" stroke-linejoin="round"/>
  
  <!-- Entablature (horizontal bar under pediment) -->
  <rect x="5" y="14" width="22" height="2.5" fill="#fff" rx="0.3"/>
  
  <!-- 5 columns -->
  <rect x="6.5"  y="16.5" width="2" height="9" fill="#fff" rx="0.5"/>
  <rect x="10.5" y="16.5" width="2" height="9" fill="#fff" rx="0.5"/>
  <rect x="15"   y="16.5" width="2" height="9" fill="#fff" rx="0.5"/>
  <rect x="19.5" y="16.5" width="2" height="9" fill="#fff" rx="0.5"/>
  <rect x="23.5" y="16.5" width="2" height="9" fill="#fff" rx="0.5"/>
  
  <!-- Base (stylobate) -->
  <rect x="4" y="25.5" width="24" height="2" fill="#fff" rx="0.3"/>
</svg>
